name: Daily Compliance Digest

on:
  schedule:
    # Runs every 15 minutes; the app enforces DIGEST_TIMEZONE + (DIGEST_HOUR, DIGEST_MINUTE).
    - cron: "*/15 * * * *"
  workflow_dispatch:

concurrency:
  group: daily-compliance-digest
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DB_PATH: data/compliance.db
      LOG_LEVEL: INFO

      # Sources
      LEGISCAN_API_KEY: ${{ secrets.LEGISCAN_API_KEY }}

      # OpenAI
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4.1' }}

      # Email (Resend)
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      EMAIL_FROM: ${{ vars.EMAIL_FROM }}
      EMAIL_TO: ${{ vars.EMAIL_TO }}

      # Schedule
      DIGEST_TIMEZONE: ${{ vars.DIGEST_TIMEZONE || 'America/Los_Angeles' }}
      DIGEST_HOUR: ${{ vars.DIGEST_HOUR || '7' }}
      DIGEST_MINUTE: ${{ vars.DIGEST_MINUTE || '0' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Prepare data dir
        run: mkdir -p data
      - name: Restore DB cache
        uses: actions/cache@v4
        with:
          path: data
          key: compliance-db-${{ github.run_id }}
          restore-keys: |
            compliance-db-
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run scheduled job
        run: python -m scripts.run_daily
